
<style>
  @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;800&display=swap');
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --panel: #0f3460;
    --accent: #e94560;
    --text: #eaeaea;
    --muted: #7a7a9a;
    --border-radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap {
    background: var(--bg);
    height: 100vh;
    min-height: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1rem;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
  }
  .logo {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }
  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 2rem;
  }
  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid #2a2a4a;
    padding: 2rem 2.25rem 1.75rem;
    max-width: 380px;
    width: 100%;
  }
  .card-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1.25rem;
  }
  .code-input {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .code-input input {
    width: 54px;
    height: 64px;
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    border: 1px solid #2a2a4a;
    border-radius: var(--border-radius);
    color: var(--text);
    caret-color: var(--accent);
    outline: none;
    text-transform: uppercase;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .code-input input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(233,69,96,0.2);
  }
  .err {
    font-size: 0.78rem;
    color: var(--accent);
    text-align: center;
    min-height: 18px;
    margin-bottom: 0.75rem;
    letter-spacing: 0.5px;
  }
  .btn {
    width: 100%;
    padding: 11px;
    border-radius: var(--border-radius);
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--accent);
    color: #fff;
    transition: opacity 0.15s, transform 0.12s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .tiles-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1.75rem;
  }
  .tile {
    width: 38px;
    height: 38px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: transform 0.15s, filter 0.15s;
  }

  .tile:hover {
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.6));
    transform: translateY(-5px);
  }

  .tile svg { width: 72%; height: 72%; display: block; }
</style>

<div class="wrap">
  <div class="tiles-row" aria-hidden="true">
    <div class="tile"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="14" fill="#e84040"/></svg></div>
    <div class="tile"><svg viewBox="0 0 40 40"><rect x="6" y="6" width="28" height="28" fill="#f4a261"/></svg></div>
    <div class="tile"><svg viewBox="0 0 40 40"><polygon points="20,4 36,20 20,36 4,20" fill="#f4d35e"/></svg></div>
    <div class="tile"><svg viewBox="0 0 40 40"><path d="M20,3 L23,16 L36,20 L23,24 L20,37 L17,24 L4,20 L17,16 Z" fill="#52b788"/></svg></div>
    <div class="tile"><svg viewBox="0 0 40 40"><circle cx="20" cy="12" r="7" fill="#4895ef"/><circle cx="20" cy="28" r="7" fill="#4895ef"/><circle cx="12" cy="20" r="7" fill="#4895ef"/><circle cx="28" cy="20" r="7" fill="#4895ef"/><circle cx="20" cy="20" r="5" fill="#4895ef"/></svg></div>
    <div class="tile"><svg viewBox="0 0 40 40"><polygon points="20,2 23.4,11.7 32.7,7.3 28.3,16.6 38,20 28.3,23.4 32.7,32.7 23.4,28.3 20,38 16.6,28.3 7.3,32.7 11.7,23.4 2,20 11.7,16.6 7.3,7.3 16.6,11.7" fill="#b14aed"/></svg></div>
  </div>

  <div class="logo">Qwirkle</div>
  <p class="subtitle">Enter room code to join</p>

  <div class="card">
    <p class="card-label">Room code</p>
    <div class="code-input" id="boxes">
      <input maxlength="1" id="c0" aria-label="Room code character 1" />
      <input maxlength="1" id="c1" aria-label="Room code character 2" />
      <input maxlength="1" id="c2" aria-label="Room code character 3" />
      <input maxlength="1" id="c3" aria-label="Room code character 4" />
    </div>
    <p class="err" id="err"></p>
    <button class="btn" id="join-btn" onclick="handleJoin()" disabled>Join room</button>
  </div>
</div>

<script src="login.js"></script>
